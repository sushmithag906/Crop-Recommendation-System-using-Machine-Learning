<!DOCTYPE html>
<html>
<head>
    <title>Crop Recommendation System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<div class="container">
    <h1>Crop Recommendation System</h1>

    <form method="POST">

        <label>Nitrogen (N)</label>
        <input type="number" name="N" value="{{ values.N if values }}">

        <label>Phosphorus (P)</label>
        <input type="number" name="P" value="{{ values.P if values }}">

        <label>Potassium (K)</label>
        <input type="number" name="K" value="{{ values.K if values }}">

        <label>Temperature (°C)</label>
        <input type="number" step="any" name="temperature" value="{{ values.temperature if values }}">

        <label>Humidity (%)</label>
        <input type="number" step="any" name="humidity" value="{{ values.humidity if values }}">

        <label>pH</label>
        <input type="number" step="any" name="ph" value="{{ values.ph if values }}">

        <label>Rainfall (mm)</label>
        <input type="number" step="any" name="rainfall" value="{{ values.rainfall if values }}">

        <div class="btn-group">
            <button type="submit" class="predict-btn">Predict Crop</button>
            <a href="/" class="clear-btn">Clear</a>
        </div>
    </form>

    {% if prediction %}
        <div class="result">
            Recommended Crop: <b>{{ prediction }}</b>
        </div>
    {% endif %}
</div>
</body>
</html>
